         <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - What's your name?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.3;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .progress-dot {
            width: 40px;
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            transition: background 0.3s ease;
        }

        .progress-dot.active {
            background: #10b981;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn-continue {
            width: 100%;
            padding: 16px;
            background: #86efac;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-continue:hover {
            background: #10b981;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-continue:active {
            transform: translateY(0);
        }

        .arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .btn-continue:hover .arrow {
            transform: translateX(4px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome! What's your name?</h1>
            <p>Let's personalize your experience</p>
        </div>

        <div class="progress-indicator">
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <form id="welcomeForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="ANISH"
                    autocomplete="name"
                    required
                >
            </div>

            <button type="submit" class="btn-continue">
                Continue
                <span class="arrow">→</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('welcomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            
            if (name.trim()) {
                // Store the name or proceed to next step
                localStorage.setItem('userName', name);
                
                // You can redirect to next page or show next step
                alert(`Welcome, ${name}! Proceeding to next step...`);
                
                // Example: window.location.href = '/next-page';
            }
        });

        // Optional: Auto-focus on input when page loads
        document.getElementById('name').focus();
    </script>
</body>
</html>
